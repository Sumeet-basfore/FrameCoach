                // Flash effect
                const overlay = document.createElement('div');
                overlay.className = 'fixed inset-0 bg-white z-[100] pointer-events-none opacity-20 transition-opacity duration-300';

                setTimeout(() => overlay.style.opacity = '0', 50);
                setTimeout(() => overlay.remove(), 350);
            });
