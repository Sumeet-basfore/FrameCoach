<script>
        // Simple micro-interaction for the slider
        const slider = document.querySelector('input[type="range"]');
        const fill = slider.nextElementSibling;
        const valueDisplay = slider.parentElement.previousElementSibling.querySelector('span');

        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            fill.style.width = `${val * 100}%`;
            valueDisplay.textContent = val;
        });

        // Toggle simulation
        document.querySelectorAll('.relative.w-12').forEach(btn => {
            btn.addEventListener('click', () => {
                const isOn = btn.classList.contains('bg-primary-container');
                if(isOn) {
                    btn.classList.remove('bg-primary-container', 'active-glow', 'justify-end');
                    btn.classList.add('bg-surface-container-highest', 'justify-start');
                    btn.querySelector('div').classList.replace('bg-on-primary', 'bg-on-surface-variant');
                } else {
                    btn.classList.remove('bg-surface-container-highest', 'justify-start');
                    btn.classList.add('bg-primary-container', 'active-glow', 'justify-end');
                    btn.querySelector('div').classList.replace('bg-on-surface-variant', 'bg-on-primary');
                }
            });
        });

        // Segmented Control simulation
        document.querySelectorAll('.grid-cols-3 button').forEach(btn => {
            btn.addEventListener('click', () => {
                const parent = btn.parentElement;
                parent.querySelectorAll('button').forEach(b => {
                    b.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
                    b.classList.add('text-on-surface-variant');
                });
                btn.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
                btn.classList.remove('text-on-surface-variant');
            });
        });
    </script>
