<!-- UI Interaction Scripts -->
<script>
        function setMode(index, btn) {
            const pill = document.getElementById('mode-pill');
            const buttons = btn.parentElement.querySelectorAll('button');
            
            // Move pill
            pill.style.left = (index * 80 + 4) + 'px';
            
            // Toggle text colors
            buttons.forEach((b, i) => {
                if(i === index) {
                    b.classList.remove('text-on-surface-variant');
                    b.classList.add('text-surface-deep');
                } else {
                    b.classList.remove('text-surface-deep');
                    b.classList.add('text-on-surface-variant');
                }
            });
        }

        // Simple mock for accelerometer UI
        let angle = 1.2;
        let direction = 1;
        setInterval(() => {
            angle += (Math.random() * 0.2 * direction);
            if (angle > 3) direction = -1;
            if (angle < -3) direction = 1;
            
            const bar = document.getElementById('horizon-bar');
            const text = document.getElementById('horizon-text');
            if(bar && text) {
                bar.style.transform = `translateX(${angle * 4}px) rotate(${angle}deg)`;
                text.innerText = angle.toFixed(1) + '°';
                
                // Success state color feedback
                if (Math.abs(angle) < 0.5) {
                    bar.classList.replace('bg-primary', 'bg-success-ice');
                    text.classList.replace('text-primary', 'text-success-ice');
                } else {
                    bar.classList.remove('bg-success-ice');
                    bar.classList.add('bg-primary');
                    text.classList.remove('text-success-ice');
                    text.classList.add('text-primary');
                }
            }
        }, 150);

        // Haptic feedback simulation
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(10);
                }
            });
        });
    </script>
